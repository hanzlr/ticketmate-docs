<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TicketMate Docs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --blurple: #5865F2;
      --blurple-hover: #4752c4;
      --text: #e3e5e8;
      --muted: #8b8fa8;
      --radius: 12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    .icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--blurple);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 2.5rem;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      text-decoration: none;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: border-color 0.2s, transform 0.2s;
      text-align: left;
    }

    .card:hover {
      border-color: var(--blurple);
      transform: translateY(-2px);
    }

    .card-icon {
      font-size: 1.5rem;
      flex-shrink: 0;
    }

    .card-title {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 0.2rem;
    }

    .card-desc {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .invite-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--blurple);
      color: #fff;
      text-decoration: none;
      padding: 0.65rem 1.5rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.2s;
      margin-bottom: 2rem;
    }

    .invite-btn:hover { background: var(--blurple-hover); }

    .footer {
      color: var(--muted);
      font-size: 0.8rem;
    }

    .footer a {
      color: var(--muted);
      text-decoration: none;
    }

    .footer a:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🎫</div>
    <h1>TicketMate</h1>
    <p class="subtitle">Legal documents and policies for TicketMate.</p>

    <div class="cards">
      <a class="card" href="./terms-of-service">
        <span class="card-icon">📋</span>
        <div>
          <div class="card-title">Terms of Service</div>
          <div class="card-desc">Rules and conditions for using TicketMate</div>
        </div>
      </a>
      <a class="card" href="./privacy-policy">
        <span class="card-icon">🔒</span>
        <div>
          <div class="card-title">Privacy Policy</div>
          <div class="card-desc">How TicketMate collects and handles your data</div>
        </div>
      </a>
    </div>

    <a class="invite-btn" href="https://discord.com/oauth2/authorize?client_id=1518488281380028506&permissions=395405544464&integration_type=0&scope=bot+applications.commands">
      📩 Invite TicketMate
    </a>

    <p class="footer">
      Made by <a href="https://github.com/hanzlr">hanzlr</a> ·
      <a href="https://github.com/hanzlr/ticketmate-bot">GitHub</a>
    </p>
  </div>
</body>
</html>
